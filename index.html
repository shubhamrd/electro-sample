<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimized Form Handler</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #0f172a;
            --border: #e2e8f0;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
        }
        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            text-align: center;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            font-size: 0.875rem;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.15);
        }
        button {
            width: 100%;
            padding: 0.75rem;
            background: var(--primary);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: var(--primary-hover);
        }
        #response {
            margin-top: 1rem;
            padding: 0.75rem;
            border-radius: 8px;
            display: none;
            font-size: 0.875rem;
            font-weight: 500;
            text-align: center;
        }
        .success {
            background: #dcfce7;
            color: #15803d;
        }
        .error {
            background: #fee2e2;
            color: #b91c1c;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>Submit Request</h1>
        <!-- Explicitly defining the method attribute in the HTML form -->
        <form id="apiForm" action="/api" method="POST">
            <div class="form-group">
                <label for="payload">Payload Data</label>
                <input type="text" id="payload" name="payload" required placeholder="Enter data to submit...">
            </div>
            <button type="submit">Submit Request</button>
        </form>
        <div id="response"></div>
    </div>

    <script>
        document.getElementById('apiForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const responseDiv = document.getElementById('response');
            const formData = new FormData(e.target);
            const payloadData = Object.fromEntries(formData.entries());

            responseDiv.style.display = 'none';

            try {
                // Resolves "missing required parameter: method" by explicitly setting 'method' in the options object
                const response = await fetch(e.target.action, {
                    method: e.target.method || 'POST', 
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(payloadData)
                });

                const result = await response.json();

                responseDiv.className = response.ok ? 'success' : 'error';
                responseDiv.textContent = result.message || (response.ok ? 'Data successfully processed!' : 'Submission failed.');
                responseDiv.style.display = 'block';
            } catch (error) {
                responseDiv.className = 'error';
                responseDiv.textContent = 'Connection error: ' + error.message;
                responseDiv.style.display = 'block';
            }
        });
    </script>
</body>
</html>
