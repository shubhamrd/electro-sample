<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Application Portal</title>
    <style>
        :root {
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --background: #f9fafb;
            --text: #111827;
            --card-bg: #ffffff;
            --border: #e5e7eb;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background-color: var(--background);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            margin-top: 0;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s;
        }
        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }
        button {
            width: 100%;
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        button:hover {
            background-color: var(--primary-hover);
        }
        .status {
            margin-top: 1rem;
            font-size: 0.875rem;
            text-align: center;
            display: none;
        }
        .success { color: #16a34a; }
        .error { color: #dc2626; }
    </style>
</head>
<body>
    <div class="card">
        <h1>Submit Request</h1>
        <form id="apiForm" method="POST" action="/api/submit">
            <div class="form-group">
                <label for="payload">Payload Data</label>
                <input type="text" id="payload" name="payload" placeholder="Enter data to send" required>
            </div>
            <button type="submit">Submit</button>
        </form>
        <div id="statusMessage" class="status"></div>
    </div>

    <script>
        document.getElementById('apiForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const form = e.target;
            const statusDiv = document.getElementById('statusMessage');
            const payloadValue = document.getElementById('payload').value;

            statusDiv.style.display = 'block';
            statusDiv.className = 'status';
            statusDiv.textContent = 'Submitting...';

            // Retrieve form method explicitly, fall back to POST
            const requestMethod = form.getAttribute('method') || 'POST';

            try {
                const response = await fetch(form.action || window.location.href, {
                    method: requestMethod,
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ 
                        method: requestMethod, // Explicitly defining the method parameter inside payload
                        payload: payloadValue 
                    })
                });

                if (response.ok) {
                    statusDiv.textContent = 'Success! Request completed.';
                    statusDiv.classList.add('success');
                } else {
                    throw new Error('Server responded with an error status');
                }
            } catch (error) {
                statusDiv.textContent = 'Error: ' + error.message;
                statusDiv.classList.add('error');
            }
        });
    </script>
</body>
</html>
